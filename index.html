<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC Rater — Down for Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#C8102E;--red-dark:#9B0A22;--red-light:#F5E6E9;--red-mid:#E8B4BC;
  --off:#FDF8F8;--g300:#D9C5C8;--g500:#8A6B6F;--black:#1A0D0F;
  --font-d:'Instrument Serif',serif;--font-b:'Inter',sans-serif;
}
html,body{height:100%;}
body{
  font-family:var(--font-b);background:var(--off);color:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:2rem;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(200,16,46,.08) 0%,transparent 60%);
  pointer-events:none;
}
.grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(#E8B4BC 1px,transparent 1px),linear-gradient(90deg,#E8B4BC 1px,transparent 1px);
  background-size:60px 60px;opacity:.25;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 80%);
}
.logo{
  font-family:var(--font-d);font-size:1.5rem;color:var(--red);
  position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);
}
.logo span{color:var(--black);}
.icon{
  width:80px;height:80px;border-radius:50%;
  border:2px solid var(--red-mid);background:var(--red-light);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin:0 auto 2rem;
  animation:float 3s ease-in-out infinite;
}
h1{
  font-family:var(--font-d);font-size:clamp(2rem,5vw,3.2rem);
  letter-spacing:-.03em;line-height:1.1;margin-bottom:1rem;
}
h1 em{font-style:italic;color:var(--red);}
p{font-size:1rem;color:var(--g500);max-width:400px;line-height:1.7;margin-bottom:2rem;}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--red-light);border:1px solid var(--red-mid);
  color:var(--red);font-size:.78rem;font-weight:600;
  padding:8px 18px;border-radius:50px;letter-spacing:.04em;
}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;}
.footer{position:absolute;bottom:1.5rem;font-size:.75rem;color:var(--g300);}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}
</style>
</head>
<body>
<div class="grid"></div>
<div class="logo">EC<span>Rater</span></div>
<div class="icon">🔧</div>
<h1>We'll be back <em>soon</em></h1>
<p>EC Rater is currently down for maintenance. We're fixing a few things to make your experience better. Check back shortly!</p>
<div class="badge"><span class="dot"></span> Currently fixing issues — back soon</div>
<div class="footer">by BerksCode</div>
</body>
</html>
