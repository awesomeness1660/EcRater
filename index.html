<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC Rater — Down for Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#5C7A62;--green-dark:#3D5C42;--green-light:#EBF0EC;--green-mid:#B5C9B8;
  --off:#F5F8F5;--g300:#C8D4CA;--g500:#7A9080;--black:#1A2B1D;
  --font-d:'Instrument Serif',serif;--font-b:'Inter',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--font-b);background:var(--off);color:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;position:relative;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 8s ease-in-out infinite;pointer-events:none;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#8FAF94,transparent);top:-150px;left:-150px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#B5C9B8,transparent);bottom:-100px;right:-100px;animation-delay:-4s;}
.logo{font-family:var(--font-d);font-size:1.5rem;color:var(--green);position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);}
.logo span{color:var(--black);}
.icon{width:80px;height:80px;border-radius:50%;border:2px solid var(--green-mid);background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 2rem;animation:float 3s ease-in-out infinite;position:relative;z-index:1;}
h1{font-family:var(--font-d);font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.03em;line-height:1.1;margin-bottom:1rem;position:relative;z-index:1;}
h1 em{font-style:italic;color:var(--green);}
p{font-size:1rem;color:var(--g500);max-width:400px;line-height:1.7;margin-bottom:2rem;position:relative;z-index:1;}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--green-light);border:1px solid var(--green-mid);color:var(--green);font-size:.78rem;font-weight:600;padding:8px 18px;border-radius:50px;letter-spacing:.04em;position:relative;z-index:1;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
.footer{position:absolute;bottom:1.5rem;font-size:.75rem;color:var(--g300);}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="logo">EC<span>Rater</span></div>
<div class="icon">🔧</div>
<h1>We'll be back <em>soon</em></h1>
<p>EC Rater is currently down for maintenance. We're fixing a few things to make your experience better. Check back shortly!</p>
<div class="badge"><span class="dot"></span> Currently fixing issues — back soon</div>
<div class="footer">by BerksCode</div>
</body>
</html>
